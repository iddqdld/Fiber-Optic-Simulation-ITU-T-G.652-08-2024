name: optical-fibre-simulator

services:
  api:
    profiles: ["core"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    init: true
  web:
    profiles: ["core"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_PROXY_TARGET: http://api:8000
    ports:
      - "${WEB_PORT:-5173}:5173"
    init: true
    depends_on:
      api:
        condition: service_healthy
  api-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: test
    init: true
    environment:
      MYPY_CACHE_DIR: /tmp/mypy-cache
      RUFF_CACHE_DIR: /tmp/ruff-cache
  web-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    init: true
    command: ["npm", "test"]
