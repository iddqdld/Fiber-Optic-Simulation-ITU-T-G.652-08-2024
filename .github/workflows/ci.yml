name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: 0.11.8
          python-version: 3.12.13
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run --frozen ruff check .
      - run: uv run --frozen ruff format --check .
      - run: uv run --frozen mypy
      - run: uv run --frozen pytest --cov=fibre_sim --cov-branch --cov-report=term-missing --cov-fail-under=90

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.4.1
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: 0.11.8
          python-version: 3.12.13
          enable-cache: true
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.4.1
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            packages/shared_schemas/package-lock.json
      - run: uv sync --frozen
      - run: ./scripts/generate_openapi_types.sh
      - run: git diff --exit-code -- packages/shared_schemas/schema/openapi.json packages/shared_schemas/generated/api.ts

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: docker/setup-buildx-action@v4.2.0
      - run: docker compose --profile core build
      - run: docker compose --profile test build
      - run: docker compose --profile test run --rm api-test
      - run: docker compose --profile test run --rm web-test
